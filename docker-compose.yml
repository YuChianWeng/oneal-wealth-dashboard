services:
  dashboard:
    build: .
    container_name: oneal-wealth-dashboard

    # Only listen on localhost — never reachable from the network
    ports:
      - "127.0.0.1:3003:3003"

    restart: unless-stopped

    environment:
      - PORT=3003
      - NODE_ENV=production
      - APP_TIMEZONE=Asia/Taipei
      - APP_ORIGIN=http://127.0.0.1:3003
      - FINANCE_DB_PATH=/data/finance/finance.db
      - OBSIDIAN_VAULT_PATH=/data/obsidian
      - MARKET_SNAPSHOT_PATH=/data/market/wealth-market-snapshot.json
      - MARKET_HISTORY_DIR=/data/market/history

    env_file:
      - .env.production

    volumes:
      # Read‑only mounts for source data — the dashboard never writes them
      - type: bind
        # Mount the directory, not just finance.db: SQLite WAL readers also
        # require finance.db-wal and finance.db-shm to see recent commits.
        source: ${FINANCE_DATA_DIR:-/dev/null}
        target: /data/finance
        read_only: true
      - type: bind
        source: ${OBSIDIAN_VAULT_PATH:-/dev/null}
        target: /data/obsidian
        read_only: true
      - type: bind
        source: ${MARKET_DATA_DIR:-/home/ubuntu/data/market}
        target: /data/market
        read_only: true

    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:3003/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
